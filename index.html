    <script>
        function updateCountdown() {
            const STORAGE_KEY = 'maintenanceEndTime';
            let endTime = localStorage.getItem(STORAGE_KEY);

            // 首次访问或存储的时间已过期，设置3小时后结束
            if (!endTime || new Date(Number(endTime)) <= new Date()) {
                endTime = new Date();
                endTime.setHours(endTime.getHours() + 3); // 维护时长：3小时，可修改
                localStorage.setItem(STORAGE_KEY, endTime.getTime());
            } else {
                endTime = new Date(Number(endTime));
            }

            const timer = setInterval(() => {
                const now = new Date();
                const diff = endTime - now;

                if (diff <= 0) {
                    clearInterval(timer);
                    localStorage.removeItem(STORAGE_KEY); // 清除过期存储
                    document.getElementById('countdown').textContent = '已恢复，刷新页面尝试访问';
                    return;
                }

                const hours = Math.floor(diff / 3600000);
                const minutes = Math.floor((diff % 3600000) / 60000);
                const seconds = Math.floor((diff % 60000) / 1000);

                document.getElementById('countdown').textContent = 
                    `${hours}小时${minutes}分钟${seconds}秒`;
            }, 1000);
        }

        updateCountdown();
    </script>
